# Локальная разработка экосистемы.
# Запуск: cd compose/dev && docker compose up
#
# Подразумевает, что репозитории всех компонентов лежат рядом,
# в ../../../<repo>/ (см. структуру в Projects/nexterm/preferences.md).

services:
  web:
    build:
      context: ../../../nexterm-web
      dockerfile: Dockerfile
    container_name: nexterm-web-dev
    ports:
      - "8080:80"
    restart: unless-stopped

