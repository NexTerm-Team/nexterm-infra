# Reusable workflow для деплоя приложения через Helm-чарт из nexterm-infra.
# Вызывается из компонентных репо (nexterm-web, nexterm-api, ...).
#
# Аутентификация: GitHub OIDC → exchange к YC OAuth API → IAM-token (~12 ч).
# Не использует SDK action'ы YC (yc-actions/*) — прямой curl, чтобы не зависеть
# от их API и не ловить deprecated/removed actions.

name: Reusable k8s deploy

on:
  workflow_call:
    inputs:
      component:
        description: 'Имя компонента, должна совпадать с именем папки k8s/apps/<component>/'
        required: true
        type: string
      image:
        description: 'Полный путь до образа без тега (например cr.yandex/<id>/web)'
        required: true
        type: string
      tag:
        description: 'Тег образа (обычно SHA коммита)'
        required: true
        type: string
      namespace:
        description: 'k8s namespace. По умолчанию совпадает с component.'
        required: false
        type: string
        default: ''
      release_name:
        description: 'Helm release name. По умолчанию совпадает с component.'
        required: false
        type: string
        default: ''
      yc_audience:
        description: 'audience для GitHub OIDC. Должна совпадать с federation.audiences в YC.'
        required: false
        type: string
        default: 'https://github.com/abukatov'
    secrets:
      YC_FEDERATED_CREDENTIAL_ID:
        required: true # audience для exchange запроса
      YC_CLUSTER_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nexterm-infra (для Helm-чарта)
        uses: actions/checkout@v4
        with:
          repository: NexTerm-Team/nexterm-infra
          ref: main
          path: infra

      - name: Get GitHub OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('${{ inputs.yc_audience }}');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Exchange OIDC token → YC IAM token
        id: yc
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          # audience при exchange = federated_credential_id (id ресурса
          # yandex_iam_workload_identity_federated_credential), НЕ federation_id и НЕ SA id.
          YC_FED_CRED_ID: ${{ secrets.YC_FEDERATED_CREDENTIAL_ID }}
        run: |
          set -euo pipefail

          if [ -z "${YC_FED_CRED_ID:-}" ]; then
            echo "::error::YC_FEDERATED_CREDENTIAL_ID secret не задан."
            exit 1
          fi

          RESPONSE=$(curl -sS -X POST \
            -w "\nHTTP_STATUS:%{http_code}\n" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
            --data-urlencode "audience=${YC_FED_CRED_ID}" \
            --data-urlencode "subject_token=${OIDC_TOKEN}" \
            --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token" \
            https://auth.yandex.cloud/oauth/token)

          HTTP_STATUS=$(echo "$RESPONSE" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_STATUS:.*//')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::YC token exchange failed (HTTP $HTTP_STATUS):"
            echo "$BODY"
            exit 1
          fi

          IAM_TOKEN=$(echo "$BODY" | jq -r '.access_token')
          if [ -z "$IAM_TOKEN" ] || [ "$IAM_TOKEN" = "null" ]; then
            echo "::error::Empty access_token in response: $BODY"
            exit 1
          fi

          echo "::add-mask::$IAM_TOKEN"
          echo "iam_token=$IAM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i $HOME/yc -n
          echo "$HOME/yc/bin" >> "$GITHUB_PATH"

      - name: Get kubeconfig
        env:
          YC_TOKEN: ${{ steps.yc.outputs.iam_token }}
        run: |
          yc managed-kubernetes cluster get-credentials \
            --id "${{ secrets.YC_CLUSTER_ID }}" \
            --external --force

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm upgrade
        run: |
          set -euo pipefail
          NS="${{ inputs.namespace }}"
          [ -z "$NS" ] && NS="${{ inputs.component }}"
          REL="${{ inputs.release_name }}"
          [ -z "$REL" ] && REL="${{ inputs.component }}"

          helm upgrade --install "$REL" \
            "infra/k8s/apps/${{ inputs.component }}" \
            --namespace "$NS" --create-namespace \
            --set image.repository="${{ inputs.image }}" \
            --set image.tag="${{ inputs.tag }}" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          NS="${{ inputs.namespace }}"
          [ -z "$NS" ] && NS="${{ inputs.component }}"
          REL="${{ inputs.release_name }}"
          [ -z "$REL" ] && REL="${{ inputs.component }}"

          # Используем selector helm-метки app.kubernetes.io/instance=<release>,
          # чтобы не зависеть от форматирования fullname в чарте.
          kubectl -n "$NS" wait --for=condition=available \
            deployment -l "app.kubernetes.io/instance=$REL" \
            --timeout=3m
